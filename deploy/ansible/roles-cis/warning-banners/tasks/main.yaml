# Task: 1.8.1.1    - Ensure message of the day is configured properly
#
# -------------------------------------+---------------------------------------8


# -------------------------------------+---------------------------------------8
#
# Update banners - Overwrite existing ones
#
# -------------------------------------+---------------------------------------8


# 1.8.1.1 Ensure message of the day is configured properly
# 1.8.1.4 Ensure permissions on /etc/motd are configured
- name:                                "Ensure message of the day is configured properly"
  ansible.builtin.copy:
    src:                               files/motd
    dest:                              /etc/motd
    owner:                             root
    group:                             root
    mode:                              0644
  become:                              true

# 1.8.1.2 Ensure local login warning banner is configured properly
# 1.8.1.5 Ensure permissions on /etc/issue are configured
- name:                                "Ensure local login warning banner is configured properly"
  ansible.builtin.copy:
    src:                               files/issue
    dest:                              /etc/issue
    owner:                             root
    group:                             root
    mode:                              0644
  become:                              true

# 1.8.1.3 Ensure remote login warning banner is configured properly
# 1.8.1.6 Ensure permissions on /etc/issue.net are configured
- name:                                "Ensure remote login warning banner is configured properly"
  ansible.builtin.copy:
    src:                               files/issue
    dest:                              /etc/issue.net
    owner:                             root
    group:                             root
    mode:                              0644
  become:                              true

